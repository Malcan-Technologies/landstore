
name: Deploy via SSH

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Validate SSH secrets and project path
      - name: Validate SSH and Project Path
        run: |
          if [ -z "${{ secrets.SERVER_SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.SERVER_PROJECT_PATH }}" ]; then
            echo "❌ Missing required secrets"
            exit 1
          fi
          echo "✅ SSH and project path secrets are set."

      # 3️⃣ Install packages and build frontend
      - name: Install dependencies and build Server
        run: |
          cd server
          echo "📦 Installing dependencies..."
          npm ci

          echo "🏗 Building frontend..."
          npm run build

          echo "✅ Frontend build successful"

      # 4️⃣ Sync only frontend to VPS
      - name: Sync Server to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_SSH_HOST }} "mkdir -p ${{ secrets.SERVER_PROJECT_PATH }}"

          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" ./server/ ${{ secrets.SSH_USER }}@${{ secrets.SERVER_SSH_HOST }}:${{ secrets.SERVER_PROJECT_PATH }}

      # 5️⃣ Deploy frontend
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="$HOME/.nvm/versions/node/v22.22.1/bin:$PATH"

            cd ${{ secrets.SERVER_PROJECT_PATH }}

            echo "📦 Installing dependencies..."
            npm ci
            echo "📍 Current directory:"
            echo pwd
            ls ..

            echo "🏗 Building..."
            npm run build

            echo "♻️ Reloading PM2 process..."
            pm2 reload server || pm2 start npm --name "server" -- start
            pm2 save

            echo "✅ Frontend deployment completed successfully!"
