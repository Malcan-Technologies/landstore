name: Deploy Client to ECS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ AWS Login
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-5

    # ✅ Login to ECR
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # ✅ Set global variables
    - name: Set environment variables
      run: |
        echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
        echo "REPOSITORY=land-marketplace/client" >> $GITHUB_ENV
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    # ✅ Build & Push Docker Image
    - name: Build and push Docker image
      run: |
        cd Client
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    # ✅ Download current task definition
    - name: Download task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition land-marketplace \
          --query taskDefinition > task-definition.json

    # ✅ Update image + ADD env vars (SAFE: append, not overwrite)
    - name: Update task definition with image + env vars
      run: |
        jq --arg IMAGE "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
           --arg MAP_KEY "${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" \
           --arg ADMIN "${{ secrets.ADMIN_EMAIL }}" \
           --arg ADMIN_PASS "${{ secrets.ADMIN_PASSWORD }}" \
           --arg USER_TYPE "admin" \
        '
        (.containerDefinitions[] | select(.name=="client") | .image) = $IMAGE
        |
        (.containerDefinitions[] | select(.name=="client") | .environment) += [
          {"name":"NEXT_PUBLIC_GOOGLE_MAPS_API_KEY","value":$MAP_KEY},
          {"name":"admin","value":$ADMIN},
          {"name":"adminpassword","value":$ADMIN_PASS},
          {"name":"userType","value":$USER_TYPE}
        ]
        |
        del(.taskDefinitionArn)
        | del(.revision)
        | del(.status)
        | del(.requiresAttributes)
        | del(.compatibilities)
        | del(.registeredAt)
        | del(.registeredBy)
        ' task-definition.json > new-task-def.json

    # ✅ Register new revision
    - name: Register new task definition
      id: register-task
      run: |
        TASK_DEF_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://new-task-def.json \
          --query 'taskDefinition.taskDefinitionArn' \
          --output text)

        echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

    # ✅ Deploy to ECS
    - name: Deploy to ECS
      run: |
        aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER }} \
          --service ${{ secrets.ECS_SERVICE }} \
          --task-definition $TASK_DEF_ARN
