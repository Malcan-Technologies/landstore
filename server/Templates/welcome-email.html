<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LandStore.my</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Arial', sans-serif; background-color: #f5f5f5;">
    <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff;">
        
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #2d7563;">
            <h1 style="color: #2d7563; margin: 0; font-size: 28px;">Welcome to LandStore.my</h1>
        </div>
        
        <!-- Main Content -->
        <div style="padding: 20px; margin-bottom: 20px;">
            <p style="font-size: 16px; color: #374151; margin: 0 0 15px 0;">
                Hello <strong style="color: #2d7563;">{{userName}}</strong>,
            </p>
            
            <p style="font-size: 16px; color: #374151; margin: 0 0 15px 0; line-height: 1.6;">
                Welcome to LandStore.my! We're thrilled to have you join our community. Your account has been successfully created and you're ready to explore premium land opportunities across Malaysia.
            </p>
        </div>
        
        <!-- Footer -->
        <div style="text-align: center; padding-top: 20px; border-top: 1px solid #e5e7eb;">
            <p style="font-size: 14px; color: #6b7280; margin: 0;">
                Happy Exploring!<br>
                <strong style="color: #2d7563;">The LandStore.my Team</strong>
            </p>
        </div>
        
    </div>
</body>
</html>
